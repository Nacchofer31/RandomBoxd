name: Coverage

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download unit test execution data
        uses: actions/download-artifact@v4
        with:
          name: jacoco-unit-exec
          path: composeApp/build/jacoco/

      - name: Download instrumented test coverage data
        uses: actions/download-artifact@v4
        with:
          name: jacoco-instrumented-ec
          path: composeApp/build/outputs/code_coverage/

      - name: Generate coverage report
        run: ./gradlew composeApp:testDebugUnitTest composeApp:jacocoTestReport -x connectedDebugAndroidTest

      - name: Verify coverage report
        run: |
          echo "=== Report size ==="
          wc -l composeApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          echo "=== First 30 lines ==="
          head -30 composeApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: composeApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
